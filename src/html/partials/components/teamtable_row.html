<tr class="align-middle">
    <td>%%no</td>
    <td class="text-center">
        <div><input aria-label="Select row" class="form-check-input" type="checkbox"></div>
    </td>
    <td>EMP-<span class="fw-semibold">%%id</span></td>
    <td>
        <div class="d-flex align-items-center gap-2">
            <div class="avatar avatar-md">
                <img src="images/avatars/%%img.jpg" alt="Employee Img" class="w-100 h-100 custom-avatar">
            </div>
            <h6 class="mb-0 fw-semibold text-dark"><span>%%empname</span>
            </h6>
        </div>
    </td>
    <td class="fw-medium">
        <div class="mb-1 d-flex align-items-center gap-1">
            <span><i class="ri-mail-line"></i></span>
            <p class="mb-0 text-lowercase">%%email</p>
        </div>
        <div class="mb-1 d-flex align-items-center gap-1">
            <span><i class="ri-phone-line"></i></span>
            <p class="mb-0">%%contact</p>
        </div>
    </td>
    <td class="text-center"><span class="badge bg-soft-primary">%%type</span></td>
    <td class="text-center fw-medium"><span class="text-primary me-1"><i class="%%modelicon fs-12"></i></span>%%model
    </td>
    <td class="text-center"><span class="badge bg-%%statusbg rounded-pill">%%status</span>
    </td>
    <td class="text-center">
        <a href="#" class="btn btn-delete text-danger border-0 p-0"><span><i
                    class="ri-delete-bin-2-line fs-4 fw-normal"></i></span></a>
    </td>
</tr>
