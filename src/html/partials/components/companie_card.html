<div class="card companie-card gradient-border h-100 mb-0 overflow-hidden">
    <!-- <div class="card-header">   
    </div> -->
    <div class="card-body">
        <div class="d-flex flex-wrap justify-content-between gap-1">
            <div class="d-flex flex-wrap gap-3">
                <div>
                    <img src="images/b_logo/%%logo" alt="%%name" class="img-fluid">
                </div>
                <div>
                    <h5 class="fw-bold mb-1 text-dark">%%name</h5>
                    <p class="text-muted mb-0"><span class="me-1"><i class="bi bi-envelope-at"></i></span> %%mailid</p>
                </div>
            </div>
            <div>
                <span class="badge rounded-pill %%statusclass px-3">%%status</span>
            </div>
        </div>
        <hr>
        <p>%%discription</p>
        <div class="d-flex flex-wrap gap-2 mb-2">
            <span class="badge bg-soft-secondary">%%badge1</span>
            <span class="badge bg-soft-secondary">%%badge2</span>
            <span class="badge bg-soft-secondary">%%badge3</span>
        </div>
        <div class="d-flex flex-wrap gap-2">
            <span class="badge bg-soft-secondary">%%badge4</span>
            <span class="badge bg-soft-secondary">%%badge5</span>
            <span class="badge bg-soft-secondary">%%badge6</span>
        </div>
    </div>
    <div class="card-footer bg-transparent border-0">
        <!-- <hr class="mt-4 br-dashed"> -->
        <div class="d-flex justify-content-end">
             <button type="button" class="btn btn-sm btn-gradient-alt-primary w-100">Visit Now <span class="fw-normal"><i class="ri-share-box-line"></i></span></button>
        </div>
    </div>
</div>
