<div class="card h-100 mb-0">
    <div class="card-body">
        <div class="d-flex flex-column h-100">
            <div class="mb-4 d-lg-flex d-none align-items-end gap-3">
                <img src="../../../images/b_logo/gmail.png" alt="gmail logo" class="img-fluid">
                <h3 class="mb-0 fw-semibold text-dark">Email</h3>
            </div>
            <div class="d-inline-block mb-4">
                <button type="button"
                    class="btn btn-gradient-primary btn-lg d-flex justify-content-between align-items-center gap-5 rounded-4"
                    onclick="openComposeModal()">Compose
                    <i class="bi bi-pencil-square"></i></button>
            </div>
            <div class="overflow-auto flex-grow-1">
                <h6 class="text-primary text-uppercase fs-14">MailBoxes</h6>
                <div class="list-group list-group-flush email-option-list-group">
                    <li class="list-group-item d-flex justify-content-between align-items-start px-2 active">
                        <a href="#"><span class="align-middle me-1"><i
                                    class="bi bi-inbox-fill"></i></span><span>Inbox</span></a>
                        <div class="ms-auto"><span class="badge bg-soft-primary rounded-pill">14</span></div>
                    </li>
                    <li class="list-group-item px-2">
                        <a href="#"><span class="align-middle me-1"><i
                                    class="bi bi-send"></i></span><span>Sent</span></a>
                    </li>
                    <li class="list-group-item d-flex justify-content-between align-items-start px-2">
                        <a href="#"><span class="align-middle me-1"><i
                                    class="bi bi-file-earmark"></i></span><span>Drafts</span></a>
                        <div class="ms-auto"><span class="badge bg-soft-primary rounded-pill">3</span></div>
                    </li>
                    <li class="list-group-item d-flex justify-content-between align-items-start px-2">
                        <a href="#"><span class="align-middle me-1"><i
                                    class="bi bi-exclamation-triangle"></i></span><span>Spam</span></a>
                        <div class="ms-auto"><span class="badge bg-soft-primary rounded-pill">7</span></div>
                    </li>
                    <li class="list-group-item px-2">
                        <a href="#"><span class="align-middle me-1"><i
                                    class="bi bi-trash"></i></span><span>Trash</span></a>
                    </li>
                </div>
                <hr class="mt-2 mb-3">
                <h6 class="text-primary text-uppercase fs-14">Filters</h6>
                <div class="list-group list-group-flush email-option-list-group">
                    <li class="list-group-item px-2">
                        <a href="#"><span class="align-middle me-1"><i
                                    class="bi bi-lock"></i></span><span>Important</span></a>
                    </li>
                    <li class="list-group-item px-2">
                        <a href="#"><span class="align-middle me-1"><i
                                    class="bi bi-star"></i></span><span>Starred</span></a>
                    </li>
                    <li class="list-group-item px-2">
                        <a href="#"><span class="align-middle me-1"><i
                                    class="bi bi-clock"></i></span><span>Scheduled</span></a>
                    </li>
                </div>
                <hr class="mt-2 mb-3">
                <div class="d-flex align-items-center justify-content-between mb-1">
                    <h6 class="text-primary text-uppercase fs-14 mb-0">Label</h6>
                    <button class="btn bg-transparent border-0 p-0 text-muted">
                        <span class="fw-medium"><i class="ri-add-large-line"></i></span>
                    </button>
                </div>
                <div class="list-group list-group-flush email-option-list-group">
                    <li class="list-group-item px-2">
                        <a href="#"><span class="align-middle me-1 text-success"><i
                                    class="bi bi-tag"></i></span><span>Payment</span></a>
                    </li>
                    <li class="list-group-item px-2">
                        <a href="#"><span class="align-middle me-1 text-info"><i
                                    class="bi bi-tag"></i></span><span>Social</span></a>
                    </li>
                    <li class="list-group-item px-2">
                        <a href="#"><span class="align-middle me-1 text-primary"><i
                                    class="bi bi-tag"></i></span><span>Client Meeting</span></a>
                    </li>
                    <li class="list-group-item px-2">
                        <a href="#"><span class="align-middle me-1 text-warning"><i
                                    class="bi bi-tag"></i></span><span>Project Team Discussion</span></a>
                    </li>
                    <li class="list-group-item px-2">
                        <a href="#"><span class="align-middle me-1 text-danger"><i
                                    class="bi bi-tag"></i></span><span>Work</span></a>
                    </li>
                </div>
            </div>
            <div class="d-lg-block d-none">
                <div class="list-group list-group-flush email-option-list-group mb-3">
                    <li class="list-group-item px-2">
                        <a href="#"><span class="align-middle me-1"><i
                                    class="bi bi-gear"></i></span><span>Setting</span></a>
                    </li>
                    <li class="list-group-item px-2">
                        <a href="#"><span class="align-middle me-1"><i class="bi bi-headset"></i></span><span>Help
                                Center</span></a>
                    </li>
                </div>
                <button class="btn btn-outline-dark btn-sm w-100 d-flex align-items-center justify-content-between">
                    <span class="d-flex align-items-center">
                        <span class="badge bg-dark rounded-circle me-2">1</span>
                        Upgrade
                    </span>
                    <span><i class="ri-arrow-right-long-fill fs-5"></i></span>
                </button>
            </div>
        </div>
    </div>
</div>
